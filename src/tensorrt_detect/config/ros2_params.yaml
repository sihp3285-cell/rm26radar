# ROS2 统一参数文件
# 所有节点的参数集中在此管理，通过 launch 文件统一加载
# 修改后需重新 colcon build 使 install 目录同步

# ─────────────────────────────────────────────
# 图像源：video_node（视频文件模式）
# ─────────────────────────────────────────────
video_node:
  ros__parameters:
    video_path: "/home/delphine/rm/car_project/test/06.mp4"
    topic_name: "/image_raw"
    fps: 20

# ─────────────────────────────────────────────
# 图像源：camera_node（工业相机模式）
# ─────────────────────────────────────────────
camera_node:
  ros__parameters:
    # --- 相机选择 ---
    camera_brand: "hik"              # 品牌: "hik" (海康) 或 "daheng" (大恒)
    camera_sn: "DA7831910"           # 相机序列号（唯一标识）

    # --- 图像参数 ---
    auto_white_balance: true         # 自动白平衡
    exposure_time: 6000             # 曝光时间 (微秒)
    gain: 0.7                        # 增益 (0.0 ~ 1.0，相对最大增益的比例)
    gamma: 0.3                       # Gamma 值

    # --- 输出 ---
    topic_name: "/image_raw"         # 发布话题（与 video_node 保持一致）
    frame_id: "camera_frame"         # 坐标系标识

    # --- 内录 ---
    enable_recording: true          # 是否同时录制视频到本地
    record_path: "/home/delphine/rm/recording/"
    record_fps: 20.0                # 录制帧率 (1.0 ~ 240.0)
    record_bitrate_kbps: 15000      # 录制视频比特率 (kbps, 1000 ~ 200000)
    max_record_queue_size: 8        # 录制队列最大长度（过大导致内存暴涨）

detect_node:
  ros__parameters:
    config_dir: "/home/delphine/rm/tensorrt10_detect/configs"
    input_topic: "/image_raw"
    output_topic: "/detected_image"
    publish_debug_image: true
    debug_output_max_width: 1280

pose_node:
  ros__parameters:
    config_dir: "/home/delphine/rm/tensorrt10_detect/configs"
    input_topic: "/armor_detections"
    output_topic: "/world_targets"

    # ══════════════════════════════════════════════════════════════
    # Tracker 参数（由 config_dir/tracker.yaml 加载，此处仅为文档说明）
    # 实际修改请编辑 configs/tracker.yaml，重启 pose_node 生效
    # ══════════════════════════════════════════════════════════════
    # max_miss: 6                    # 连续丢失多少帧后 track 标记为 DEAD
    # max_predict: 3                 # 连续丢失多少帧内保持 PREDICTED（卡尔曼外推）
    # min_hit: 3                     # 最少命中次数才允许对外输出 / 绑定 slot
    # max_tracks: 20                 # 最大同时跟踪的 PhysicalTrack 数量
    # max_gate_box: 1500.0           # 像素框中心距离门限
    # max_gate_world: 2.5            # 世界坐标 gate（米），<= 0 则禁用
    # kalman_gate_box: 18.467        # 4维 box 创新 NIS 门限（约 99.9%）
    # kalman_gate_world: 13.816      # 2维 world 创新 NIS 门限（约 99.9%）
    # negative_gate_box: 200.0       # 死亡负观测像素中心抑制距离
    # negative_gate_world: 1.0       # 死亡负观测世界坐标抑制距离（米）
    # w_box: 1.0                     # 像素框归一化距离权重
    # w_world: 1.0                   # 世界坐标归一化距离权重
    # class_mismatch_min_penalty: 0.05 # 跨兵种匹配的最低软惩罚
    # class_mismatch_penalty: 0.40   # 跨兵种匹配的最大软惩罚（随身份/检测可靠度动态插值）
    # min_identity_update_conf: 0.20 # 身份更新最低置信度
    # slot_bind_min_conf: 0.40       # 绑定 slot 最低 stable confidence
    # slot_takeover_miss: 6          # owner 丢失保护帧数（禁止其他 track 抢槽）
    # slot_release_miss: 8           # owner 丢失释放槽位帧数
    # max_slot_jump_dist: 2.5        # 防 slot 瞬移最大距离（米），<= 0 则禁用
    # # BotIdentity 身份稳定器子参数:
    # bot_identity.max_history: 30           # 历史观测最大保存帧数
    # bot_identity.purge_threshold: 20       # 连续丢失多少帧后清空历史
    # bot_identity.min_history_for_stable: 6 # 稳定身份最小历史长度门槛
    # bot_identity.decay: 0.99               # 指数加权衰减系数
    # bot_identity.num_classes: 9            # 类别总数

map_node:
  ros__parameters:
    config_dir: "/home/delphine/rm/tensorrt10_detect/configs"
    input_topic: "/world_targets"
    output_image_topic: "/map_image"
    output_map_topic: "/radar_map"

qt_display_node:
  ros__parameters:
    video_topic: "/detected_image"
    map_image_topic: "/map_image"

calibrate_node:
  ros__parameters:
    config_dir: "/home/delphine/rm/tensorrt10_detect/configs"
    image_topic: "/image_raw"
    calib_result_path: "/home/delphine/rm/tensorrt10_detect/configs/calib_result.yaml"
    reprojection_threshold: 10.0
    auto_calibrate: true
    auto_calibrate_delay_sec: 2

roi_set_node:
  ros__parameters:
    config_dir: "/home/delphine/rm/tensorrt10_detect/configs"
    image_topic: "/image_raw"
    outpost_roi_path: "/home/delphine/rm/tensorrt10_detect/configs/outpost_roi.yaml"
    auto_set_roi: true
    auto_set_delay_sec: 3
